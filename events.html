          <svg viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">

  <script>
    const AIRTABLE_TOKEN      = 'patNbETAvcOjyx6LR.4187065f033a6ed6e056f68e0fe98d5c381df27b1ce516f71f2c91b9da1c8531';
    const AIRTABLE_EVENTS_URL = 'https://api.airtable.com/v0/appUNfNKB7WXeeld6/Events%20%26%20Flyers';

    const CATEGORY_COLORS = {
      music:     'linear-gradient(160deg, #1a1a2e 0%, #4a3060 100%)',
      community: 'linear-gradient(160deg, #2d2d2d 0%, #5a4a3a 100%)',
      arts:      'linear-gradient(160deg, #1e3a2f 0%, #2d6a4f 100%)',
      wellness:  'linear-gradient(160deg, #2e1a1a 0%, #7a3b3b 100%)',
    };

    const grid    = document.getElementById('evGrid');
    const overlay = document.getElementById('evOverlay');

    // ── FETCH & RENDER ──
    async function loadEvents() {
      try {
        const filter = encodeURIComponent("{Show On Website}=1");
        let records = [], offset = '';
        do {
          const url = AIRTABLE_EVENTS_URL + '?filterByFormula=' + filter + (offset ? '&offset=' + offset : '');
          const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + AIRTABLE_TOKEN } });
          if (!res.ok) throw new Error('fetch failed');
          const json = await res.json();
          records = records.concat(json.records);
          offset = json.offset || '';
        } while (offset);

        grid.innerHTML = '';

        if (records.length === 0) {
          grid.innerHTML = '<p style="text-align:center;color:#888;padding:60px 20px;grid-column:1/-1;">No upcoming events at this time. Check back soon!</p>';
          return;
        }

        records.forEach(record => {
          const f        = record.fields;
          const category = (f['Event Category'] || 'community').toLowerCase();
          const name     = f['Event Name'] || '';
          const date     = f['Date and Time'] || '';
          const flyer      = f['Flyer Image'] && f['Flyer Image'][0] ? f['Flyer Image'][0].url : null;
          const ticketLink = f['Ticket Link'] || null;
          const label    = f['Event Category'] || (category.charAt(0).toUpperCase() + category.slice(1));

          const flyerHTML = flyer
            ? `<img src="${flyer}" alt="${name}" style="width:100%;height:100%;object-fit:cover;" />`
            : `<span class="ev-flyer-placeholder">${label}</span>`;

          const el = document.createElement('div');
          el.className = 'ev-card';
          el.dataset.category = category;
          el.style.cursor = 'pointer';
          el.innerHTML = `
            <div class="ev-flyer" style="background:${flyer ? '#111' : (CATEGORY_COLORS[category] || '#333')}">
              ${flyerHTML}
            </div>
            <div class="ev-card-info">
              <span class="ev-card-tag">${label}</span>
              <h3 class="ev-card-name">${name}</h3>
              <p class="ev-card-date">${date}</p>
            </div>`;
          el.addEventListener('click', () => openEvModal(record));
          el.dataset.ticketLink = ticketLink || '';
          grid.appendChild(el);
        });
      } catch(e) {
        console.warn('Could not load events:', e.message);
      }
    }

    // ── MODAL ──
    function openEvModal(record) {
      const f          = record.fields;
      const flyer      = f['Flyer Image'] && f['Flyer Image'][0] ? f['Flyer Image'][0].url : null;
      const label      = f['Event Category'] || '';
      const ticketLink = f['Ticket Link'] || null;

      const flyerHTML = flyer
        ? `<div class="bk-event-flyer"><img src="${flyer}" alt="${f['Event Name']} flyer" /></div>`
        : `<div class="bk-event-flyer" style="background:#f0eef9;flex-direction:column;gap:6px;">
             <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
             <span style="font-size:12px;color:#9490cc;font-weight:500;">Flyer coming soon</span>
           </div>`;

      const soldOut   = f['Sold Out'] || false;
      const ticketBtn = soldOut
        ? `<div style="display:block;text-align:center;background:#aaa;color:#fff;padding:14px;border-radius:8px;font-weight:600;margin-bottom:12px;cursor:default;">Sold Out</div>`
        : ticketLink
          ? `<a href="${ticketLink}" target="_blank" rel="noopener" class="bk-submit" style="display:block;text-align:center;text-decoration:none;margin-bottom:12px;">Get Tickets</a>`
          : '';

      document.getElementById('evModalContent').innerHTML = `
        <h2 class="bk-modal-title" id="evModalTitle">${f['Event Name'] || ''}</h2>
        ${flyerHTML}
        <span class="bk-event-tag">${label}</span>
        <div class="bk-event-meta">
          <span class="bk-event-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${f['Date and Time'] || ''}
          </span>
          <span class="bk-event-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${f['Location'] || ''}
          </span>
        </div>
        <p class="bk-event-desc">${f['Event Description'] || ''}</p>
        ${ticketBtn}
        <button class="bk-submit bk-submit-outline" onclick="closeEvModal()">Close</button>`;

      overlay.classList.add('bk-overlay-active');
      overlay.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
    }

    function closeEvModal() {
      overlay.classList.remove('bk-overlay-active');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    document.getElementById('evModalClose').addEventListener('click', closeEvModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeEvModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeEvModal(); });


    // ── FILTERS ──
    document.querySelectorAll('.ev-filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.ev-filter-btn').forEach(b => b.classList.remove('ev-filter-active'));
        btn.classList.add('ev-filter-active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.ev-card').forEach(card => {
          card.style.display = (filter === 'all' || card.dataset.category === filter) ? '' : 'none';
        });
      });
    });

    loadEvents();
  </script>
