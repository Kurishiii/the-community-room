  <script>
    const AIRTABLE_TOKEN        = 'patNbETAvcOjyx6LR.4187065f033a6ed6e056f68e0fe98d5c381df27b1ce516f71f2c91b9da1c8531';
    const AIRTABLE_BOOKINGS_URL = 'https://api.airtable.com/v0/appUNfNKB7WXeeld6/Booking%20Requests';
    const AIRTABLE_EVENTS_URL   = 'https://api.airtable.com/v0/appUNfNKB7WXeeld6/Events%20%26%20Flyers';

    // ─────────────────────────────────────────────
    // DATA — populated from Airtable on page load
    // ─────────────────────────────────────────────
    const OWNER_EVENTS    = {};
    const CLIENT_BOOKINGS = {}; // { 'YYYY-MM-DD': { confirmed: [{start,end,fullDay}], pending: [...] } }
    const TOUR_DATES      = {};

    // ─────────────────────────────────────────────
    // CONSTANTS
    // ─────────────────────────────────────────────
    const BUFFER_MIN     = 60;
    const MAX_BOOK_MIN   = 4 * 60;
    const OPEN_MIN       = 8  * 60; // 8 AM
    const CLOSE_MIN      = 22 * 60; // 10 PM
    const FULL_DAY_START = 8  * 60; // 8 AM
    const FULL_DAY_END   = 20 * 60; // 8 PM

    const EVENT_TYPES = [
      'Birthday Party',
      'Corporate Event',
      'Brand Activation / Pop-Up',
      'Content Shoot / Photo Shoot',
      'Wellness Event (Pilates, Yoga, etc.)',
      'Bridal / Baby Shower',
      'Community Gathering',
      'Workshop / Class',
      'Non-profit',
      'Other',
    ];

    const MONTH_NAMES = [
      'January','February','March','April','May','June',
      'July','August','September','October','November','December'
    ];
    const DAY_NAMES = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    // ─────────────────────────────────────────────
    // HELPERS
    // ─────────────────────────────────────────────
    function pad(n) { return String(n).padStart(2, '0'); }
    function toKey(y, m, d) { return `${y}-${pad(m + 1)}-${pad(d)}`; }

    function minutesToLabel(m) {
      const h    = Math.floor(m / 60);
      const min  = m % 60;
      const ampm = h >= 12 ? 'PM' : 'AM';
      const h12  = h === 0 ? 12 : h > 12 ? h - 12 : h;
      return `${h12}:${pad(min)} ${ampm}`;
    }
    function minutesToValue(m) { return `${pad(Math.floor(m / 60))}:${pad(m % 60)}`; }
    function valueToMinutes(v) { const [h, m] = v.split(':').map(Number); return h * 60 + m; }

    // Returns true if [aS,aE] overlaps [bS,bE] when each side is extended by buf
    function overlaps(aS, aE, bS, bE, buf = 0) { return aS < bE + buf && aE > bS - buf; }

    function getDayData(key) { return CLIENT_BOOKINGS[key] || { confirmed: [], pending: [] }; }

    function isFullyBlocked(key) {
      const d = CLIENT_BOOKINGS[key];
      if (!d) return false;
      return d.confirmed.some(b => b.fullDay || (b.end - b.start) >= (FULL_DAY_END - FULL_DAY_START));
    }

    // ─────────────────────────────────────────────
    // CALENDAR
    // ─────────────────────────────────────────────
    const TODAY = new Date();
    TODAY.setHours(0, 0, 0, 0);

    let viewYear  = TODAY.getFullYear();
    let viewMonth = TODAY.getMonth();

    function renderCalendar() {
      document.getElementById('monthLabel').textContent = `${MONTH_NAMES[viewMonth]} ${viewYear}`;
      const grid = document.getElementById('calGrid');
      grid.innerHTML = '';

      DAY_NAMES.forEach(d => {
        const h = document.createElement('div');
        h.className = 'bk-cal-day-header';
        h.textContent = d;
        grid.appendChild(h);
      });

      const firstWeekday = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth  = new Date(viewYear, viewMonth + 1, 0).getDate();

      for (let i = 0; i < firstWeekday; i++) {
        const e = document.createElement('div');
        e.className = 'bk-cal-cell bk-cell-empty';
        grid.appendChild(e);
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const key      = toKey(viewYear, viewMonth, d);
        const cellDate = new Date(viewYear, viewMonth, d);
        const isPast   = cellDate < TODAY;
        const isToday  = cellDate.getTime() === TODAY.getTime();

        const owner   = OWNER_EVENTS[key];
        const tour    = TOUR_DATES[key];
        const dayData = getDayData(key);
        const blocked    = isFullyBlocked(key);
        const hasPending = dayData.pending.length > 0;

        const cell = document.createElement('div');
        cell.className = 'bk-cal-cell';
        if (isPast)  cell.classList.add('bk-cell-past');
        if (isToday) cell.classList.add('bk-cell-today');

        const num = document.createElement('span');
        num.className = 'bk-day-num';
        num.textContent = d;
        cell.appendChild(num);

        if (!isPast) {
          if (tour) {
            cell.classList.add('bk-cell-tours', 'bk-cell-clickable');
            const pill = document.createElement('span');
            pill.className = 'bk-pill bk-pill-tours';
            pill.textContent = 'Tour';
            cell.appendChild(pill);
            cell.addEventListener('click', () => openTourModal(key));

          } else if (owner) {
            cell.classList.add('bk-cell-owner', 'bk-cell-clickable');
            const pill = document.createElement('span');
            pill.className = 'bk-pill bk-pill-owner';
            pill.textContent = owner.name;
            cell.appendChild(pill);
            if (owner.soldOut) {
              const sol = document.createElement('span');
              sol.className = 'bk-pill-soldout';
              sol.textContent = 'Sold Out';
              cell.appendChild(sol);
            }
            cell.addEventListener('click', () => openEventModal(key));

          } else if (blocked) {
            cell.classList.add('bk-cell-private');
            const pill = document.createElement('span');
            pill.className = 'bk-pill bk-pill-private';
            pill.textContent = 'Private event';
            cell.appendChild(pill);

          } else if (hasPending) {
            cell.classList.add('bk-cell-pending', 'bk-cell-clickable');
            const pill = document.createElement('span');
            pill.className = 'bk-pill bk-pill-pending';
            pill.textContent = 'Limited Availability';
            cell.appendChild(pill);
            cell.addEventListener('click', () => openModal(key, d));

          } else {
            cell.classList.add('bk-cell-available', 'bk-cell-clickable');
            const avail = document.createElement('span');
            avail.className = 'bk-avail-label';
            avail.textContent = '+ Available';
            cell.appendChild(avail);
            cell.addEventListener('click', () => openModal(key, d));
          }
        }

        grid.appendChild(cell);
      }
    }

    document.getElementById('prevMonth').addEventListener('click', () => {
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    });
    document.getElementById('nextMonth').addEventListener('click', () => {
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar();
    });

    // ─────────────────────────────────────────────
    // MODAL
    // ─────────────────────────────────────────────
    const overlay = document.getElementById('overlay');
    let selectedDate = null;

    function openModal(key, day) {
      selectedDate = key;
      const [y, m] = key.split('-');
      const title   = `${MONTH_NAMES[parseInt(m, 10) - 1]} ${day}, ${y}`;
      const dayData = getDayData(key);

      document.getElementById('modalContent').innerHTML = buildForm(title, dayData);
      overlay.classList.add('bk-overlay-active');
      overlay.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';

      const etypeSelect = document.getElementById('etype');
      const otherWrap   = document.getElementById('otherEventWrap');
      etypeSelect.addEventListener('change', () => {
        otherWrap.hidden = etypeSelect.value !== 'Other';
      });

      document.querySelectorAll('input[name="collab"]').forEach(radio => {
        radio.addEventListener('change', () => {
          document.getElementById('collabOptionsWrap').hidden = radio.value !== 'yes';
        });
      });

      const fullDayCheck   = document.getElementById('fullDay');
      const timePickerWrap = document.getElementById('timePickerWrap');

      fullDayCheck.addEventListener('change', () => {
        const on = fullDayCheck.checked;
        timePickerWrap.style.opacity = on ? '0.4' : '1';
        document.getElementById('startTime').disabled = on;
        document.getElementById('endTime').disabled   = on;
        checkConflict(on ? FULL_DAY_START : null, on ? FULL_DAY_END : null, dayData);
      });

      document.getElementById('startTime').addEventListener('change', function () {
        if (this.value) rebuildEndTimes(valueToMinutes(this.value), dayData);
      });

      document.getElementById('endTime').addEventListener('change', function () {
        const sEl = document.getElementById('startTime');
        if (sEl.value && this.value) {
          checkConflict(valueToMinutes(sEl.value), valueToMinutes(this.value), dayData);
        }
      });

      document.getElementById('bookingForm').addEventListener('submit', handleSubmit);
    }

    function closeModal() {
      document.activeElement?.blur();
      overlay.classList.remove('bk-overlay-active');
      overlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    // ─────────────────────────────────────────────
    // TIME PICKER HELPERS
    // ─────────────────────────────────────────────
    function rebuildEndTimes(startMin, dayData) {
      const endSelect = document.getElementById('endTime');
      endSelect.innerHTML = '<option value="">Select end time…</option>';
      const cap = Math.min(startMin + MAX_BOOK_MIN, CLOSE_MIN);

      for (let m = startMin + 30; m <= cap; m += 30) {
        const blocked = dayData.confirmed.some(b => overlaps(startMin, m, b.start, b.end, BUFFER_MIN));
        const opt = document.createElement('option');
        opt.value       = minutesToValue(m);
        opt.textContent = minutesToLabel(m) + (blocked ? ' (unavailable)' : '');
        opt.disabled    = blocked;
        endSelect.appendChild(opt);
      }

      // Auto-select the latest unblocked option
      const valid = Array.from(endSelect.options).filter(o => o.value && !o.disabled);
      if (valid.length) {
        endSelect.value = valid[valid.length - 1].value;
        checkConflict(startMin, valueToMinutes(valid[valid.length - 1].value), dayData);
      }
    }

    function checkConflict(startMin, endMin, dayData) {
      const disc = document.getElementById('pendingDisclaimer');
      if (!disc) return;
      if (startMin === null || endMin === null) { disc.hidden = true; return; }
      disc.hidden = !dayData.pending.some(b => overlaps(startMin, endMin, b.start, b.end, BUFFER_MIN));
    }

    // ─────────────────────────────────────────────
    // FORM BUILDER
    // ─────────────────────────────────────────────
    function buildForm(title, dayData) {
      const typeOptions = EVENT_TYPES.map(t => `<option value="${t}">${t}</option>`).join('');

      let startOptions = '<option value="">Select start time…</option>';
      for (let m = OPEN_MIN; m <= CLOSE_MIN - 30; m += 30) {
        const blocked = dayData.confirmed.some(b => m >= b.start - BUFFER_MIN && m < b.end + BUFFER_MIN);
        startOptions += `<option value="${minutesToValue(m)}" ${blocked ? 'disabled' : ''}>${minutesToLabel(m)}${blocked ? ' (unavailable)' : ''}</option>`;
      }

      const hasPending = dayData.pending.length > 0;

      return `
        <h2 class="bk-modal-title" id="modalTitle">Book for ${title}</h2>
        ${hasPending ? `<div class="bk-pending-notice">⚠️ Some times on this day have pending requests. You may still book — confirmed requests have priority.</div>` : ''}
        <form id="bookingForm" novalidate>

          <div class="bk-field-row">
            <div class="bk-field">
              <label class="bk-label" for="fname">Full Name <span class="bk-req">*</span></label>
              <input class="bk-input" type="text" id="fname" name="fname" placeholder="Your full name" autocomplete="name" />
            </div>
            <div class="bk-field">
              <label class="bk-label" for="email">Email</label>
              <input class="bk-input" type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email" />
            </div>
          </div>

          <div class="bk-field-row">
            <div class="bk-field">
              <label class="bk-label" for="phone">Phone Number</label>
              <input class="bk-input" type="tel" id="phone" name="phone" placeholder="(401) 000-0000" autocomplete="tel" />
            </div>
            <div class="bk-field">
              <label class="bk-label" for="etype">Event Type <span class="bk-req">*</span></label>
              <select class="bk-input bk-select" id="etype" name="etype">
                <option value="">Select event type…</option>
                ${typeOptions}
              </select>
            </div>
          </div>

          <div id="otherEventWrap" hidden>
            <div class="bk-field">
              <label class="bk-label" for="otherEvent">Tell us about your event</label>
              <textarea class="bk-input bk-textarea" id="otherEvent" name="otherEvent" placeholder="Briefly describe what you have in mind…"></textarea>
            </div>
          </div>

          <div class="bk-field" style="max-width: 200px;">
            <label class="bk-label" for="guests">Est. Guest Count <span class="bk-req">*</span></label>
            <input class="bk-input" type="number" id="guests" name="guests" min="1" max="500" placeholder="e.g. 30" />
          </div>

          <label style="margin-top: 16px; display: flex; align-items: center; gap: 10px; cursor: pointer;">
            <input type="checkbox" id="fullDay" name="fullDay" style="width:16px;height:16px;flex-shrink:0;" />
            <span class="bk-label" style="margin:0;">Rent for full day <span style="color:#888;font-weight:400;">(8 AM – 8 PM)</span></span>
          </label>

          <div class="bk-field-row" id="timePickerWrap" style="margin-top: 12px;">
            <div class="bk-field">
              <label class="bk-label" for="startTime">Start Time <span class="bk-req">*</span></label>
              <select class="bk-input bk-select" id="startTime" name="startTime">
                ${startOptions}
              </select>
            </div>
            <div class="bk-field">
              <label class="bk-label" for="endTime">End Time <span class="bk-req">*</span></label>
              <select class="bk-input bk-select" id="endTime" name="endTime">
                <option value="">Select start time first…</option>
              </select>
              <span style="font-size:11px;color:#999;margin-top:4px;display:block;">Max 4 hours per booking</span>
            </div>
          </div>

          <div id="pendingDisclaimer" class="bk-pending-disclaimer" hidden>
            ⚠️ This time slot has a pending request. You may still submit, but priority is given to the first requester.
          </div>

          <div class="bk-field" style="margin-top: 16px;">
            <label class="bk-label" for="setup">What kind of setup do you need? <span class="bk-req">*</span></label>
            <select class="bk-input bk-select" id="setup" name="setup">
              <option value="">Select setup type…</option>
              <option value="open_mingling">Open Mingling</option>
              <option value="tables_chairs">Tables/Chairs</option>
              <option value="vendor_booths">Vendor Booths</option>
              <option value="stage_area">Stage Area</option>
              <option value="other">Other</option>
            </select>
          </div>

          <div class="bk-field" style="margin-top: 16px;">
            <label class="bk-label">Are you interested in collaboration opportunities or community-based pricing?</label>
            <div class="bk-radio-group">
              <label class="bk-radio-label"><input type="radio" name="collab" value="yes" /> Yes</label>
              <label class="bk-radio-label"><input type="radio" name="collab" value="no" /> No</label>
            </div>
          </div>

          <div id="collabOptionsWrap" hidden>
            <div class="bk-field">
              <label class="bk-label" for="collabType">Select collaboration type</label>
              <select class="bk-input bk-select" id="collabType" name="collabType">
                <option value="">Select an option…</option>
                <option value="co_hosted">Co-Hosted Events</option>
                <option value="ticket_splits">Ticket Splits</option>
                <option value="nonprofit_rates">Nonprofit Rates</option>
                <option value="vendor_partnerships">Vendor Partnerships</option>
              </select>
            </div>
          </div>

          <div class="bk-field" style="margin-top: 16px;">
            <label class="bk-label">Are you interested in adding any café or beverage services (coffee/matcha bar)?</label>
            <div class="bk-radio-group">
              <label class="bk-radio-label"><input type="radio" name="cafe" value="yes" /> Yes</label>
              <label class="bk-radio-label"><input type="radio" name="cafe" value="no" /> No</label>
            </div>
          </div>

          <div class="bk-field" style="margin-top: 16px;">
            <label class="bk-label" for="notes">Additional Notes</label>
            <textarea class="bk-input bk-textarea" id="notes" name="notes" placeholder="Any special requests or details about your event…"></textarea>
          </div>

          <div class="bk-error" id="formError" hidden>Please fill in all required fields marked with *</div>

          <button type="submit" class="bk-submit">Send Request</button>
        </form>`;
    }

    // ─────────────────────────────────────────────
    // SUBMIT HANDLER
    // ─────────────────────────────────────────────
    async function handleSubmit(e) {
      e.preventDefault();
      const form      = e.target;
      const fname     = form.fname.value.trim();
      const etype     = form.etype.value;
      const guests    = form.guests.value.trim();
      const setup     = form.setup.value;
      const isFullDay = form.fullDay.checked;
      const startTime = isFullDay ? '08:00' : form.startTime.value;
      const endTime   = isFullDay ? '20:00' : form.endTime.value;

      const formError = document.getElementById('formError');
      formError.hidden = true;

      if (!fname || !etype || !guests || !setup || !startTime || !endTime) {
        formError.textContent = 'Please fill in all required fields marked with *';
        formError.hidden = false;
        return;
      }

      const submitBtn = form.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Sending…';

      const collabRadio = form.querySelector('input[name="collab"]:checked');
      const cafeRadio   = form.querySelector('input[name="cafe"]:checked');

      const SETUP_LABELS = {
        open_mingling: 'Open Mingling',
        tables_chairs: 'Tables/Chairs',
        vendor_booths: 'Vendor Booths',
        stage_area:    'Stage Area',
        other:         'Other',
      };

      const collabValue = collabRadio && collabRadio.value === 'yes'
        ? ('Yes' + (form.collabType && form.collabType.value ? ' — ' + form.collabType.options[form.collabType.selectedIndex].text : ''))
        : (collabRadio ? 'No' : '');

      const rawFields = {
        'Full Name':               fname,
        'Email':                   form.email.value.trim(),
        'Phone Number':            form.phone.value.trim(),
        'Event Type':              etype,
        'Other Event Description': etype === 'Other' ? form.otherEvent.value.trim() : '',
        'Est. Guest Count':        parseInt(guests, 10),
        'Setup Type':              SETUP_LABELS[setup] || setup,
        'Matcha Cart / Beverage Service Interest': cafeRadio ? (cafeRadio.value === 'yes' ? 'Yes' : 'No') : '',
        'Collaboration Interest':  collabValue,
        'Additional Notes':        form.notes.value.trim(),
        'Event Date':              selectedDate || '',
        'Start Time':              startTime,
        'End Time':                endTime,
        'Full Day Rental':         isFullDay || undefined,
        'Status':                  'Pending',
      };

      const fields = Object.fromEntries(
        Object.entries(rawFields).filter(([, v]) => v !== '' && v !== null && v !== undefined)
      );

      try {
        const res = await fetch(AIRTABLE_BOOKINGS_URL, {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + AIRTABLE_TOKEN,
            'Content-Type':  'application/json',
          },
          body: JSON.stringify({ fields }),
        });

        if (!res.ok) {
          const err = await res.json();
          console.error('Airtable error type:', err?.error?.type);
          console.error('Airtable error message:', err?.error?.message);
          throw new Error('Airtable error');
        }

        document.getElementById('modalContent').innerHTML = `
          <div class="bk-confirm">
            <div class="bk-confirm-icon">✓</div>
            <h2 class="bk-confirm-title">Request received!</h2>
            <p class="bk-confirm-msg">We'll be in touch within 24 hours.</p>
            <button class="bk-submit bk-submit-outline" onclick="closeModal()" style="margin-top: 28px;">Close</button>
          </div>`;
        overlay.removeAttribute('aria-hidden');
      } catch (err) {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Send Request';
        formError.textContent = 'Something went wrong. Please try again or email us directly.';
        formError.hidden = false;
      }
    }

    // ─────────────────────────────────────────────
    // OWNER EVENT DETAIL MODAL
    // ─────────────────────────────────────────────
    function openEventModal(key) {
      const ev = OWNER_EVENTS[key];
      if (!ev) return;

      const flyerHTML = ev.flyer
        ? `<div class="bk-event-flyer"><img src="${ev.flyer}" alt="${ev.name} flyer" /></div>`
        : `<div class="bk-event-flyer" style="background:#f0eef9; flex-direction:column; gap:6px;">
             <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#534AB7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21,15 16,10 5,21"/></svg>
             <span style="font-size:12px;color:#9490cc;font-weight:500;">Flyer coming soon</span>
           </div>`;

      document.getElementById('modalContent').innerHTML = `
        <h2 class="bk-modal-title" id="modalTitle">${ev.name}</h2>
        ${flyerHTML}
        <span class="bk-event-tag">${ev.tag}</span>
        <div class="bk-event-meta">
          <span class="bk-event-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${ev.date}
          </span>
          <span class="bk-event-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${ev.location}
          </span>
        </div>
        <p class="bk-event-desc">${ev.desc}</p>
        ${ev.soldOut
          ? `<div style="display:block;text-align:center;background:#aaa;color:#fff;padding:14px;border-radius:8px;font-weight:600;margin-bottom:12px;cursor:default;">Sold Out</div>`
          : ev.ticketLink
            ? `<a href="${ev.ticketLink}" target="_blank" rel="noopener" class="bk-submit" style="display:block;text-align:center;text-decoration:none;margin-bottom:12px;">Get Tickets</a>`
            : ''}
        <button class="bk-submit bk-submit-outline" onclick="closeModal()">Close</button>`;

      overlay.classList.add('bk-overlay-active');
      overlay.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
    }

    // ─────────────────────────────────────────────
    // AIRTABLE OWNER EVENTS
    // ─────────────────────────────────────────────
    async function fetchOwnerEvents() {
      try {
        const filter = encodeURIComponent("{Show On Website}=1");
        let records = [], offset = '';
        do {
          const url = AIRTABLE_EVENTS_URL + '?filterByFormula=' + filter + (offset ? '&offset=' + offset : '');
          const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + AIRTABLE_TOKEN } });
          if (!res.ok) throw new Error('fetch failed');
          const json = await res.json();
          records = records.concat(json.records);
          offset = json.offset || '';
        } while (offset);

        records.forEach(record => {
          const f       = record.fields;
          const dateKey = f['Event Date'] ? f['Event Date'].slice(0, 10) : null;
          if (!dateKey) return;
          OWNER_EVENTS[dateKey] = {
            name:       f['Event Name']        || 'Event',
            tag:        f['Event Category']    || 'Event',
            date:       f['Date and Time']     || '',
            location:   f['Location']          || 'The Community Room Studio',
            detail:     f['Event Category']    || '',
            desc:       f['Event Description'] || '',
            flyer:      f['Flyer Image'] && f['Flyer Image'][0] ? f['Flyer Image'][0].url : null,
            ticketLink: f['Ticket Link']       || null,
            soldOut:    f['Sold Out']          || false,
          };
        });
      } catch(e) {
        console.warn('Could not load owner events:', e.message);
      }
    }

    // ─────────────────────────────────────────────
    // AIRTABLE BOOKINGS — Confirmed + Pending
    // ─────────────────────────────────────────────

    // Parses "HH:MM" (24-hr) or "H:MM AM/PM" into minutes since midnight
    function parseTimeToMinutes(t) {
      if (!t) return null;
      const ampm = t.match(/(\d+):(\d+)\s*(AM|PM)/i);
      if (ampm) {
        let h = parseInt(ampm[1], 10);
        const m = parseInt(ampm[2], 10);
        const period = ampm[3].toUpperCase();
        if (period === 'AM' && h === 12) h = 0;
        if (period === 'PM' && h !== 12) h += 12;
        return h * 60 + m;
      }
      return valueToMinutes(t);
    }

    async function fetchBookings() {
      try {
        // Include Confirmed, Pending, and blank-status records; exclude only Cancelled
        const filter = encodeURIComponent("NOT({Status}='Cancelled')");
        let records = [], offset = '';
        do {
          const url = AIRTABLE_BOOKINGS_URL
            + '?filterByFormula=' + filter
            + '&fields[]=Event%20Date&fields[]=Status&fields[]=Start%20Time&fields[]=End%20Time&fields[]=Full%20Day%20Rental'
            + (offset ? '&offset=' + offset : '');
          const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + AIRTABLE_TOKEN } });
          if (!res.ok) {
            const err = await res.json();
            console.error('Bookings fetch error:', err?.error?.message);
            return;
          }
          const json = await res.json();
          records = records.concat(json.records);
          offset = json.offset || '';
        } while (offset);

        records.forEach(record => {
          const f       = record.fields;
          const dateKey = f['Event Date'] ? f['Event Date'].slice(0, 10) : null;
          if (!dateKey) return;
          if (!CLIENT_BOOKINGS[dateKey]) CLIENT_BOOKINGS[dateKey] = { confirmed: [], pending: [] };

          let startMin, endMin, isFullDay;
          if (f['Full Day Rental']) {
            startMin = FULL_DAY_START; endMin = FULL_DAY_END; isFullDay = true;
          } else if (f['Start Time'] && f['End Time']) {
            startMin  = parseTimeToMinutes(f['Start Time']);
            endMin    = parseTimeToMinutes(f['End Time']);
            isFullDay = false;
          } else {
            startMin = FULL_DAY_START; endMin = FULL_DAY_END; isFullDay = true;
          }

          if (startMin === null || endMin === null) return;

          const status = (f['Status'] || '').toLowerCase();
          const bucket = status === 'confirmed' ? 'confirmed' : 'pending';
          CLIENT_BOOKINGS[dateKey][bucket].push({ start: startMin, end: endMin, fullDay: isFullDay });
        });
      } catch (e) {
        console.warn('Could not load bookings:', e.message);
      }
    }

    // ─────────────────────────────────────────────
    // AIRTABLE TOURS
    // ─────────────────────────────────────────────
    async function fetchTours() {
      try {
        const res = await fetch('https://api.airtable.com/v0/appUNfNKB7WXeeld6/Tours', {
          headers: { 'Authorization': 'Bearer ' + AIRTABLE_TOKEN }
        });
        if (!res.ok) return;
        const json = await res.json();
        json.records.forEach(record => {
          const f    = record.fields;
          const date = f['Date'];
          if (date) TOUR_DATES[date.slice(0, 10)] = {
            time:     f['Date and Time'] || '',
            location: f['Location']      || 'The Community Room Studio',
            desc:     f['Description']   || '',
          };
        });
      } catch (e) {
        console.warn('Could not load tours:', e.message);
      }
    }

    function openTourModal(key) {
      const tour = TOUR_DATES[key];
      if (!tour) return;
      const [y, m, d] = key.split('-');
      const title = `${MONTH_NAMES[parseInt(m, 10) - 1]} ${parseInt(d, 10)}, ${y}`;

      document.getElementById('modalContent').innerHTML = `
        <h2 class="bk-modal-title" id="modalTitle">Studio Tour — ${title}</h2>
        <span class="bk-event-tag">Tour</span>
        <div class="bk-event-meta">
          ${tour.time ? `<span class="bk-event-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            ${tour.time}
          </span>` : ''}
          <span class="bk-event-meta-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
            ${tour.location}
          </span>
        </div>
        ${tour.desc ? `<p class="bk-event-desc">${tour.desc}</p>` : ''}
        <button class="bk-submit bk-submit-outline" onclick="closeModal()">Close</button>`;

      overlay.classList.add('bk-overlay-active');
      overlay.removeAttribute('aria-hidden');
      document.body.style.overflow = 'hidden';
    }

    // ─────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────
    Promise.all([fetchOwnerEvents(), fetchBookings(), fetchTours()]).then(() => renderCalendar());
  </script>

  <script src="chat-agent.js"></script>
  <script src="img-overrides.js"></script>
  <script src="nav.js"></script>
</body>
